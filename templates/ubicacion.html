<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Ubicaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addubicacion">+ Add Venue</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Venues List</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Direccion</th>
                        <th>Ciudad</th>
                        <th>Capacidad</th>
                        <th>Coordenadas GPS</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in ubicacion %}
                    <tr>
                        <td>{{ u.id_ubicacion }}</td>
                        <td>{{ u.nombre }}</td>
                        <td>{{ u.direccion }}</td>
                        <td>{{ u.ciudad }}</td>
                        <td>{{ u.capacidad }}</td>
                        <td>{{ u.coordenadas_gps }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updateubicacion/{{ u.id_ubicacion }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta ubicacion?')"
                               href="/deleteubicacion/{{ u.id_ubicacion }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
