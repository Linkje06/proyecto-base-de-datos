<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Event–Sponsor' if ep else 'Add Event–Sponsor' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/evento_patrocinador">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Event–Sponsor' if ep else 'Add Event–Sponsor' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Evento</label>
                    <select class="form-select" name="id_evento">
                        {% for e in eventos %}
                        <option value="{{ e.id_evento }}"
                            {% if ep and ep.id_evento == e.id_evento %}selected{% endif %}>
                            {{ e.titulo }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Patrocinador</label>
                    <select class="form-select" name="id_patrocinador">
                        {% for p in patrocinadores %}
                        <option value="{{ p.id_patrocinador }}"
                            {% if ep and ep.id_patrocinador == p.id_patrocinador %}selected{% endif %}>
                            {{ p.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Aporte</label>
                    <input type="text" class="form-control" name="aporte"
                           value="{{ ep.aporte if ep }}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/evento_patrocinador" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
