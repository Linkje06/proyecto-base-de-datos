<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Merch' if merch else 'Add Merch' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/merch">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Merch' if merch else 'Add Merch' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Artista</label>
                    <select class="form-select" name="id_artista">
                        {% for a in artistas %}
                        <option value="{{ a.id_artista }}"
                            {% if merch and merch.id_artista == a.id_artista %}selected{% endif %}>
                            {{ a.nombre_artistico }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Item</label>
                    <input type="text" class="form-control" name="nombre_item"
                           value="{{ merch.nombre_item if merch }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio (€)</label>
                    <input type="text" class="form-control" name="precio"
                           value="{{ merch.precio if merch }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control" name="stock"
                           value="{{ merch.stock if merch }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input type="text" class="form-control" name="tipo"
                           value="{{ merch.tipo if merch }}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/merch" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
