<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Event' if evento else 'Add Event' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/evento">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 700px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Event' if evento else 'Add Event' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Titulo</label>
                    <input type="text" class="form-control" name="titulo"
                           value="{{ evento.titulo if evento }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripcion</label>
                    <textarea class="form-control" name="descripcion">{{ evento.descripcion if evento }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control" name="fecha"
                           value="{{ evento.fecha if evento }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Hora Inicio</label>
                    <input type="time" class="form-control" name="hora_inicio"
                           value="{{ evento.hora_inicio if evento }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Hora Fin</label>
                    <input type="time" class="form-control" name="hora_fin"
                           value="{{ evento.hora_fin if evento }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ubicacion</label>
                    <select class="form-select" name="id_ubicacion">
                        <option value="">-- Seleccionar --</option>
                        {% for u in ubicaciones %}
                        <option value="{{ u.id_ubicacion }}"
                            {% if evento and evento.id_ubicacion == u.id_ubicacion %}selected{% endif %}>
                            {{ u.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Evento</label>
                    <input type="text" class="form-control" name="tipo_evento"
                           value="{{ evento.tipo_evento if evento }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-select" name="estado">
                        <option value="planificado" {% if evento and evento.estado=='planificado' %}selected{% endif %}>Planificado</option>
                        <option value="confirmado" {% if evento and evento.estado=='confirmado' %}selected{% endif %}>Confirmado</option>
                        <option value="cancelado" {% if evento and evento.estado=='cancelado' %}selected{% endif %}>Cancelado</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/evento" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
