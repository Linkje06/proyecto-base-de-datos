<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Venue' if ubicacion else 'Add Venue' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/ubicacion">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Venue' if ubicacion else 'Add Venue' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" name="nombre"
                           value="{{ ubicacion.nombre if ubicacion }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Direccion</label>
                    <input type="text" class="form-control" name="direccion"
                           value="{{ ubicacion.direccion if ubicacion }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Ciudad</label>
                    <input type="text" class="form-control" name="ciudad"
                           value="{{ ubicacion.ciudad if ubicacion }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Capacidad</label>
                    <input type="number" class="form-control" name="capacidad"
                           value="{{ ubicacion.capacidad if ubicacion }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Coordenadas GPS</label>
                    <input type="text" class="form-control" name="coordenadas_gps"
                           value="{{ ubicacion.coordenadas_gps if ubicacion }}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/ubicacion" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
