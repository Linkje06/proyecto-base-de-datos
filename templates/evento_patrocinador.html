<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Evento–Patrocinador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addevento_patrocinador">+ Add Event–Sponsor</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Event–Sponsor Assignments</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Patrocinador</th>
                        <th>Aporte</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for ep in evento_patrocinador %}
                    <tr>
                        <td>{{ ep.id_evento_patro }}</td>
                        <td>{{ ep.id_evento }}</td>
                        <td>{{ ep.id_patrocinador }}</td>
                        <td>{{ ep.aporte }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updateevento_patrocinador/{{ ep.id_evento_patro }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta relacion evento–patrocinador?')"
                               href="/deleteevento_patrocinador/{{ ep.id_evento_patro }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
