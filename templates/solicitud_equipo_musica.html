<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Equipo Música</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addsolicitud_equipo_musica">+ Add Request</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Equipment Requests</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Item</th>
                        <th>Cantidad</th>
                        <th>Estado</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in solicitud_equipo_musica %}
                    <tr>
                        <td>{{ s.id_solicitud }}</td>
                        <td>{{ s.id_evento }}</td>
                        <td>{{ s.nombre_item }}</td>
                        <td>{{ s.cantidad }}</td>
                        <td>{{ s.estado }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updatesolicitud_equipo_musica/{{ s.id_solicitud }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta solicitud?')"
                               href="/deletesolicitud_equipo_musica/{{ s.id_solicitud }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
