<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Merch</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addmerch">+ Add Merch</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Merch List</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Artista</th>
                        <th>Nombre Item</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Tipo</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for m in merch %}
                    <tr>
                        <td>{{ m.id_merch }}</td>
                        <td>{{ m.id_artista }}</td>
                        <td>{{ m.nombre_item }}</td>
                        <td>{{ m.precio }}</td>
                        <td>{{ m.stock }}</td>
                        <td>{{ m.tipo }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updatemerch/{{ m.id_merch }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este merch?')"
                               href="/deletemerch/{{ m.id_merch }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
