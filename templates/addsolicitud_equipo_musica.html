<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Request' if solicitud else 'Add Request' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/solicitud_equipo_musica">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Request' if solicitud else 'Add Request' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Evento</label>
                    <select class="form-select" name="id_evento">
                        {% for e in eventos %}
                        <option value="{{ e.id_evento }}"
                            {% if solicitud and solicitud.id_evento == e.id_evento %}selected{% endif %}>
                            {{ e.titulo }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Item</label>
                    <input type="text" class="form-control" name="nombre_item"
                           value="{{ solicitud.nombre_item if solicitud }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" class="form-control" name="cantidad"
                           value="{{ solicitud.cantidad if solicitud }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select class="form-select" name="estado">
                        <option value="pendiente" {% if solicitud and solicitud.estado=='pendiente' %}selected{% endif %}>Pendiente</option>
                        <option value="adquirido" {% if solicitud and solicitud.estado=='adquirido' %}selected{% endif %}>Adquirido</option>
                        <option value="cancelado" {% if solicitud and solicitud.estado=='cancelado' %}selected{% endif %}>Cancelado</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/solicitud_equipo_musica" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
