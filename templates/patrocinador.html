<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Patrocinadores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addpatrocinador">+ Add Sponsor</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Sponsors List</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Contacto</th>
                        <th>Web</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in patrocinador %}
                    <tr>
                        <td>{{ p.id_patrocinador }}</td>
                        <td>{{ p.nombre }}</td>
                        <td>{{ p.tipo }}</td>
                        <td>{{ p.contacto }}</td>
                        <td>{{ p.enlace_web }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updatepatrocinador/{{ p.id_patrocinador }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este patrocinador?')"
                               href="/deletepatrocinador/{{ p.id_patrocinador }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
