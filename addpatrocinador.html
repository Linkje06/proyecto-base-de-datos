<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Sponsor' if patrocinador else 'Add Sponsor' }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/patrocinador">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">{{ 'Edit Sponsor' if patrocinador else 'Add Sponsor' }}</h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" name="nombre"
                           value="{{ patrocinador.nombre if patrocinador }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input type="text" class="form-control" name="tipo"
                           value="{{ patrocinador.tipo if patrocinador }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contacto</label>
                    <input type="text" class="form-control" name="contacto"
                           value="{{ patrocinador.contacto if patrocinador }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Enlace Web</label>
                    <input type="text" class="form-control" name="enlace_web"
                           value="{{ patrocinador.enlace_web if patrocinador }}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/patrocinador" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
