<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Artist' if artist else 'Add Artist' }} – SubcultureCentral</title>

    <link rel="stylesheet" crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">

    <script crossorigin="anonymous"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js">
    </script>

    <style>
        body { background-color: #f0f2f5; }
        .card { max-width: 650px; margin: auto; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                {{ 'Edit Artist' if artist else 'Add Artist' }}
            </h4>
        </div>

        <div class="card-body">

            <form action="" method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre Artistico</label>
                    <input type="text" class="form-control" name="nombre_artistico"
                           value="{{ artist.nombre_artistico if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Real</label>
                    <input type="text" class="form-control" name="nombre_real"
                           value="{{ artist.nombre_real if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Género Principal</label>
                    <input type="text" class="form-control" name="genero_principal"
                           value="{{ artist.genero_principal if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Subgénero</label>
                    <input type="text" class="form-control" name="subgenero"
                           value="{{ artist.subgenero if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Pais</label>
                    <input type="text" class="form-control" name="pais"
                           value="{{ artist.pais if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Enlaces Sociales</label>
                    <input type="text" class="form-control" name="enlaces_sociales"
                           value="{{ artist.enlaces_sociales if artist else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Cache (€)</label>
                    <input type="text" class="form-control" name="cache"
                           value="{{ artist.cache if artist else '' }}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/artistas" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
