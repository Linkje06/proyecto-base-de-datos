<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>SubcultureCentral – Tickets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SubcultureCentral</a>
        <a class="btn btn-success" href="/addticket">+ Add Ticket</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Tickets List</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Evento</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Codigo QR</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in ticket %}
                    <tr>
                        <td>{{ t.id_ticket }}</td>
                        <td>{{ t.id_evento }}</td>
                        <td>{{ t.tipo }}</td>
                        <td>{{ t.precio }}</td>
                        <td>{{ t.estado }}</td>
                        <td>{{ t.codigo_qr }}</td>
                        <td>
                            <a class="btn btn-warning btn-sm" href="/updateticket/{{ t.id_ticket }}">Edit</a>
                        </td>
                        <td>
                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este ticket?')"
                               href="/deleteticket/{{ t.id_ticket }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
